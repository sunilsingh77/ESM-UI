<section class="page-container">
  <!-- Header -->
  <app-page-header title="Skills" subtitle="Manage organization skills">
    <button headerAction class="btn btn-primary" (click)="save()">
      <i class="bi bi-plus-circle"></i>

      Add Skill
    </button>
  </app-page-header>

  <!-- Main Content -->

  <div class="page-content">
    <!-- Left -->

    <div class="form-section">
      <div class="card">
        <div class="card-header">
          <h2>
            {{ editingId ? 'Edit Skill' : 'Skill Details' }}
          </h2>
        </div>

        <div class="card-body">
          <form (ngSubmit)="save()">
            <div class="form-group">
              <label for="name">Skill Name</label>

              <input class="form-control" [(ngModel)]="form.name" name="name" required />
            </div>

            <div class="form-group">
              <label for="category">Category</label>

              <input class="form-control" [(ngModel)]="form.category" name="category" required />
            </div>

            <div class="form-group">
              <label for="description">Description</label>

              <textarea class="form-control" [(ngModel)]="form.description" name="description" rows="4" required>
              </textarea>
            </div>

            <div class="form-buttons">
              <button class="btn btn-primary" type="submit">
                <i class="bi bi-check-circle"></i>

                {{ editingId ? 'Update' : 'Save' }}
              </button>

              <button class="btn btn-secondary" type="button" (click)="reset()">
                <i class="bi bi-x-circle"></i>

                Clear
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Right -->

    <div class="grid-section">
      <app-page-card title="Skill List" [badge]="filteredSkills.length">
        <div class="grid-toolbar">
          <app-search-box placeholder="Search skill..." [(value)]="searchText" (search)="applyFilter()">
          </app-search-box>
        </div>

        @if (success) {
          <div class="alert success">
            {{ success }}
          </div>
        }

        @if (error) {
          <div class="alert error">
            {{ error }}
          </div>
        }

        @if (loading) {
          <app-loading-spinner message="Loading skills..."> </app-loading-spinner>
        }
        <!-- Table -->
        <app-table>
          <thead>
            <tr>
              <th>Name</th>

              <th>Category</th>

              <th>Description</th>

              <th style="width: 120px; text-align: center">Actions</th>
            </tr>
          </thead>

          <tbody>
            @for (skill of skills; track skill.id) {
              <tr>
                <td>{{ skill.name }}</td>

                <td>{{ skill.category }}</td>

                <td>{{ skill.description }}</td>

                <td>
                  <div class="actions">
                    <button class="edit" type="button" title="Edit Skill" (click)="edit(skill)">
                      <i class="bi bi-pencil-square"></i>
                    </button>

                    <button class="delete" type="button" title="Delete Skill" (click)="delete(skill)">
                      <i class="bi bi-trash"></i>
                    </button>
                  </div>
                </td>
              </tr>
            }

            @if (skills.length === 0) {
              <tr>
                <td colspan="4">
                  <app-empty-state icon="bi bi-award" title="No Skills" description="No skills have been added yet.">
                  </app-empty-state>
                </td>
              </tr>
            }
          </tbody>
        </app-table>
      </app-page-card>

      <!--<div class="table-responsive"></div>-->
    </div>
    <app-confirm-dialog
      [visible]="showDeleteDialog"
      title="Delete Skill"
      message="Are you sure you want to delete this Skill.?"
      confirmText="Delete"
      cancelText="Cancel"
      (confirmed)="confirmDelete()"
      (cancelled)="cancelDelete()"
    >
    </app-confirm-dialog>
  </div>
</section>
