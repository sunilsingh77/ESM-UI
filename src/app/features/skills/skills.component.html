<section class="page">
  <div class="page-header">
    <div>
      <h2>Skills</h2>
      <p>Maintain the skill catalog.</p>
    </div>
  </div>

  <div class="page-content">
    <form class="form-grid" (ngSubmit)="save()">
      <label>Name <input [(ngModel)]="form.name" name="name" required /></label>
      <label>Category <input [(ngModel)]="form.category" name="category" required /></label>
      <label class="wide">Description <input [(ngModel)]="form.description" name="description" required /></label>
      <div class="form-actions">
        <button type="submit">{{ editingId ? 'Update' : 'Create' }}</button>
        <button type="button" class="secondary" (click)="reset()">Clear</button>
      </div>
    </form>

    <div>
      @if (error) {
        <div class="alert error">
          {{ error }}
        </div>
      }

      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Description</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          @for (skill of skills; track skill.id) {
            <tr>
              <td>{{ skill.name }}</td>
              <td>{{ skill.category }}</td>
              <td>{{ skill.description }}</td>
              <td class="actions">
                <button type="button" class="secondary" (click)="edit(skill)">Edit</button>
                <button type="button" class="danger" (click)="delete(skill.id)">Delete</button>
              </td>
            </tr>
          } @empty {
            <tr>
              <td colspan="4" class="text-center">No skills found.</td>
            </tr>
          }
        </tbody>
      </table>
    </div>
  </div>
</section>
