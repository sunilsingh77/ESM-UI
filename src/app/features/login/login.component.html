<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-circle">👥</div>

      <h2>Employee Skills Summary</h2>

      <p>Sign in to continue</p>
    </div>

    @if (isValidating) {
      <div class="validation-status">
        <span class="loading-dot"></span>
        Validating your session...
      </div>
    }

    @if (!isValidating) {
      <form (ngSubmit)="submit()">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" [(ngModel)]="email" name="email" placeholder="Enter your email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required />
        </div>

        <div class="login-options">
          <label class="remember-me">
            <input type="checkbox" />
            Remember me
          </label>

          <a href="#">Forgot Password?</a>
        </div>

        <button class="login-btn" type="submit" [disabled]="isSubmitting">
          {{ isSubmitting ? 'Signing In...' : 'Sign In' }}
        </button>
      </form>
    }
    @if (error) {
      <div class="error">
        {{ error }}
      </div>
    }
  </div>
</div>
