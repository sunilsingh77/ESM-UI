<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">ESM</div>

    <button class="mobile-toggle" (click)="toggleMobileMenu()" *ngIf="true">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <div class="nav-status" *ngIf="(((auth.loggedIn$ | async) || auth.isLoggedIn()) && currentRoute !== '/login')">
      <ul class="nav-menu" [class.active]="mobileMenuOpen">
        <li class="nav-item" *ngFor="let item of navItems">
          <a href="#" class="nav-link" [class.active]="currentRoute === item.route" (click)="navigateWithPrefetch(item.route, $event)">{{ item.label }}</a>
        </li>
        <li class="nav-item user-role">
          <span>{{ auth.getUserRoleLabel() }}</span>
        </li>
        <li class="nav-item">
          <button type="button" class="nav-link nav-button" (click)="logout()">Logout</button>
        </li>
      </ul>
    </div>

    <div class="nav-spinner" *ngIf="loading" role="status" aria-live="polite">
      <span class="spinner"></span>
    </div>
  </div>
</nav>
