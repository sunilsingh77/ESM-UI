<nav class="navbar">
  <div class="navbar-container">
    <div class="navbar-brand">ESM</div>
    
    <button class="mobile-toggle" (click)="toggleMobileMenu()" *ngIf="true">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <ul class="nav-menu" [class.active]="mobileMenuOpen" *ngIf="auth.isLoggedIn()">
      <li class="nav-item" *ngFor="let item of navItems">
        <a [routerLink]="item.route" routerLinkActive="active" class="nav-link">{{ item.label }}</a>
      </li>
      <li class="nav-item user-role">
        <span>{{ auth.getUserRoleLabel() }}</span>
      </li>
      <li class="nav-item">
        <button type="button" class="nav-link nav-button" (click)="logout()">Logout</button>
      </li>
    </ul>
  </div>
</nav>
