<div class="loading-container" [class.full-height]="fullHeight">
  <div class="spinner-border text-primary"></div>
  <p>
    {{ message }}
  </p>
</div>

@if (loading$ | async) {
  <div class="loading-overlay">
    <div class="loading-box">
      <div class="spinner-border text-primary"></div>
      <p>Loading...</p>
    </div>
  </div>
}
