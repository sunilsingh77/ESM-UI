@if (loading$ | async) {
  <div class="loading-overlay">
    <div class="loading-card">
      <div class="spinner-border text-primary" role="status">
        <span class="visually-hidden"> Loading... </span>
      </div>
      <h5>Please wait...</h5>
      <p>Processing your request.</p>
    </div>
  </div>
}
